# Data Platform Engineer — case-study harness.
#
#   Default:  ClickHouse only            ->  docker compose up -d
#   Optional: add the Kafka streaming path ->  docker compose --profile kafka up -d
#                                          then docker compose --profile kafka run --rm producer
#
# The Kafka path is OFF by default. The expected route is to read the files in
# ./sample-data directly. Kafka is provided only if you want to consume the same
# records from topics instead.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: dpe-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native TCP interface
    environment:
      CLICKHOUSE_DB: warehouse
      CLICKHOUSE_USER: dpe
      CLICKHOUSE_PASSWORD: dpe
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "dpe", "--password", "dpe", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- optional streaming path (profile: kafka) -------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: dpe-kafka
    profiles: ["kafka"]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: replays each sample file onto a topic named after it, then exits.
  producer:
    image: python:3.11-slim
    profiles: ["kafka"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./kafka:/work:ro
      - ./sample-data:/sample-data:ro
    working_dir: /work
    command: ["sh", "-c", "pip install --quiet kafka-python==2.0.2 && python produce.py"]

#volumes:
#  clickhouse-data:

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dpe-pipeline
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    command: ["python", "src/main.py"]
volumes:
  clickhouse-data: